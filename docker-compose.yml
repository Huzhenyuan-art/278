version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: it_platform_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: it_platform
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: 
      context: ./backend
    container_name: it_platform_backend
    restart: always
    ports:
      - "5160:5160"
    environment:
      PORT: 5160
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: it_platform
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: admin123
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_USER_USERNAME: user
      SEED_USER_PASSWORD: user123
      SEED_USER_EMAIL: user@example.com
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend
    container_name: it_platform_frontend
    restart: always
    ports:
      - "3160:3160"
    depends_on:
      - backend

volumes:
  db_data:
